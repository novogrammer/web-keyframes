<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>web-keyframes hero-animation example</title>
    <link rel="stylesheet" href="/node_modules/web-keyframes/dist/editor.css">
    <link rel="stylesheet" href="./src/generated/animations.css">
    <link rel="stylesheet" href="./src/generated/example.css">
  </head>
  <body>
    <div class="example-shell">
      <section class="p-home-section-hero">
        <div class="p-home-section-hero__background">
          <div class="p-home-section-hero__human js-hero-human">
            <picture>
              <source media="(min-width: 768px)" srcset="https://dummyimage.com/1200x670/8ff/fff.png?text=Human">
              <img class="p-home-section-hero__human-image" src="https://dummyimage.com/375x670/8ff/fff.png?text=Human" alt="Human">
            </picture>
          </div>
        </div>
        <div class="p-home-section-hero__foreground">
          <h2 class="p-home-section-hero__title js-hero-title">
            <img class="p-home-section-hero__title-image" src="https://dummyimage.com/600x400/000/fff.png?text=Title" alt="Title">
          </h2>
          <div class="p-home-section-hero__date js-hero-date">
            <img class="p-home-section-hero__date-image" src="https://dummyimage.com/600x100/000/fff.png?text=Date" alt="Date">
          </div>
          <div class="p-home-section-hero__badge js-hero-badge">
            <img class="p-home-section-hero__badge-image" src="https://dummyimage.com/100x100/000/fff.png?text=Badge" alt="Badge">
          </div>
          <div class="p-home-section-hero__balloon p-home-section-hero__balloon--01 js-hero-balloon-01">
            <img class="p-home-section-hero__balloon-image" src="https://dummyimage.com/100x100/000/fff.png?text=Balloon%2001" alt="Balloon 01">
          </div>
          <div class="p-home-section-hero__balloon p-home-section-hero__balloon--02 js-hero-balloon-02">
            <img class="p-home-section-hero__balloon-image" src="https://dummyimage.com/100x100/000/fff.png?text=Balloon%2002" alt="Balloon 02">
          </div>
          <div class="p-home-section-hero__balloon p-home-section-hero__balloon--03 js-hero-balloon-03">
            <img class="p-home-section-hero__balloon-image" src="https://dummyimage.com/100x100/000/fff.png?text=Balloon%2003" alt="Balloon 03">
          </div>
          <div class="p-home-section-hero__balloon p-home-section-hero__balloon--04 js-hero-balloon-04">
            <img class="p-home-section-hero__balloon-image" src="https://dummyimage.com/100x100/000/fff.png?text=Balloon%2004" alt="Balloon 04">
          </div>
        </div>
      </section>

      <div class="example-bar">
        <div>
          <p class="example-kicker">web-keyframes example</p>
          <h1 class="example-title">Hero animation port</h1>
          <p class="example-copy">
            `hello-theatrejs/src/study/hero-animation/` を timeline JSON と生成 CSS に移し替えたサンプルです。
          </p>
        </div>
        <button type="button" class="example-button" data-example-action="toggle-editor">Toggle editor</button>
      </div>
    </div>

    <script type="importmap">
      {
        "imports": {
          "web-keyframes": "/node_modules/web-keyframes/dist/index.js",
          "web-keyframes/editor": "/node_modules/web-keyframes/dist/editor.js"
        }
      }
    </script>
    <script type="module" src="./src/main.js"></script>
  </body>
</html>
